services:
  postgres:
    image: postgres:16-alpine
    container_name: ats_expense_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ats
      # Only used when the data volume is first created. To init a fresh volume
      # with the real password from backend/.env, run:
      #   docker compose --env-file backend/.env up -d
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ats_password}
      POSTGRES_DB: ats_expenses
    # Host port 5433 (5432 is often taken by a local Postgres install).
    ports:
      - "5433:5432"
    volumes:
      - ats_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats -d ats_expenses"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ats_pgdata:
